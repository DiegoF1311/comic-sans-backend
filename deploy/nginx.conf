# Upstream: el resolver de Docker hace DNS round-robin entre las réplicas
# del servicio "api-gateway" registradas en la red tienda-net.
upstream api_gateway {
    server api-gateway:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    client_max_body_size 10M;

    # ── API → api-gateway (con balanceo) ───────────────────────────
    location /api/ {
        proxy_pass http://api_gateway/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── Health agregado del LB ─────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Raíz ───────────────────────────────────────────────────────
    location = / {
        return 200 "TiendaGenerica API behind nginx LB\n";
        add_header Content-Type text/plain;
    }
}
