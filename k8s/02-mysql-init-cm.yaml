apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: comic-sans
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS db_users   CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS db_catalog CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS db_customers CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS db_sales   CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
