apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: comic-sans
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: comic-sans
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: comic-sans-backend-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: USER_SERVICE_URL
              value: "http://user-service:3002"
            - name: CATALOG_SERVICE_URL
              value: "http://catalog-service:3003"
            - name: CUSTOMER_SERVICE_URL
              value: "http://customer-service:3004"
            - name: SALES_SERVICE_URL
              value: "http://sales-service:3005"
            - name: REPORT_SERVICE_URL
              value: "http://report-service:3006"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: comic-sans-secrets
                  key: JWT_SECRET
          resources:
            requests: { memory: 32Mi, cpu: 25m }
            limits:   { memory: 128Mi, cpu: 200m }
